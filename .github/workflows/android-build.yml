name: Android Build & Release

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build and Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Extract versionName from build.gradle
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName" android/app/build.gradle | head -n 1 | awk -F'"' '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Build Release APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false
          arguments: |
            -p android assembleRelease

      - name: Prepare APK for Release
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk library-app-v${{ env.VERSION_NAME }}.apk

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ github.run_number }}
          name: Release v${{ env.VERSION_NAME }}
          body: |
            ### Automated Release
            - **Version**: ${{ env.VERSION_NAME }}
            - **Build Number**: ${{ github.run_number }}
            - **Commit**: ${{ github.sha }}
            - **Status**: Stable
          files: library-app-v${{ env.VERSION_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

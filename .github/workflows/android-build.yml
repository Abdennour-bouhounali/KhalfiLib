name: Android Build & Release

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    name: Build and Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Extract versionName from build.gradle
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName" android/app/build.gradle | head -n 1 | awk -F'"' '{print $2}')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APKs for Release
        run: |
          mkdir -p release-apks
          # Find all generated APKs and copy them with better names
          find android/app/build/outputs/apk/release/ -name "*.apk" | while read -r apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == *"universal"* ]]; then
              cp "$apk" "library-app-v${{ env.VERSION_NAME }}-universal.apk"
            elif [[ "$filename" == *"arm64-v8a"* ]]; then
              cp "$apk" "library-app-v${{ env.VERSION_NAME }}-arm64.apk"
            elif [[ "$filename" == *"armeabi-v7a"* ]]; then
              cp "$apk" "library-app-v${{ env.VERSION_NAME }}-armv7.apk"
            else
              cp "$apk" "library-app-v${{ env.VERSION_NAME }}-${filename}"
            fi
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}-${{ github.run_number }}
          name: Release v${{ env.VERSION_NAME }}
          body: |
            ### 🚀 Optimized Release v${{ env.VERSION_NAME }}
            
            This release includes multiple APK versions to save space:
            - **Universal**: ~45MB (Works on all devices)
            - **Arm64**: ~25MB (Recommended for most modern phones)
            - **Armv7**: ~25MB (For older phones)
            
            **Changes:**
            - Enabled R8/Minification to reduce code size.
            - Enabled Resource Shrinking.
            - Split APKs by architecture.
          files: library-app-v${{ env.VERSION_NAME }}-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Automated Firebase Notification
        run: |
          npm install firebase-admin
          node scripts/notify-firebase.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          BUILD_NUMBER: ${{ github.run_number }}
          APK_URL: "https://github.com/Abdennour-bouhounali/KhalfiLib/releases/download/v${{ env.VERSION_NAME }}-${{ github.run_number }}/library-app-v${{ env.VERSION_NAME }}-arm64.apk"
